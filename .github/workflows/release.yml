name: Release

on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['7.4', '8.0', '8.1', '8.2', '8.3']

    name: Test PHP ${{ matrix.php-version }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php-version }}-composer-${{ hashFiles('**/composer.lock', '**/composer.json') }}
          restore-keys: ${{ runner.os }}-php-${{ matrix.php-version }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run tests
        run: vendor/bin/phpunit

  release:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-progress

      - name: Build ZIP
        run: |
          mkdir -p build
          rsync -a --exclude-from='.distignore' . build/tailsignal/
          cd build && zip -r tailsignal.zip tailsignal/ -x "*.DS_Store"
          rm -rf build/tailsignal

      - name: Verify ZIP exists
        run: test -f build/tailsignal.zip && echo "ZIP created successfully ($(du -h build/tailsignal.zip | cut -f1))"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/tailsignal.zip
