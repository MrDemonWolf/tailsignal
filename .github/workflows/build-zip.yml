name: Dev Build

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-progress
        working-directory: src

      - name: Build ZIP
        run: |
          mkdir -p build
          rsync -a --exclude-from='src/.distignore' src/ build/tailsignal/
          cd build && zip -r tailsignal.zip tailsignal/ -x "*.DS_Store"
          rm -rf build/tailsignal

      - name: Get ZIP size
        id: zip-info
        run: echo "size=$(du -h build/tailsignal.zip | cut -f1)" >> $GITHUB_OUTPUT

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: tailsignal-dev
          path: build/tailsignal.zip
          retention-days: 14

      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: dev-build
          message: |
            **Dev Build Ready**

            Download the plugin ZIP from the [Actions artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) page.

            **Artifact:** `tailsignal-dev` (${{ steps.zip-info.outputs.size }})
            **Commit:** ${{ github.event.pull_request.head.sha }}
