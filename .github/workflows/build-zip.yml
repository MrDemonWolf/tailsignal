name: Build Plugin ZIP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-progress

      - name: Build ZIP
        run: |
          mkdir -p build
          rsync -a --exclude-from='.distignore' . build/tailsignal/
          cd build && zip -r tailsignal.zip tailsignal/ -x "*.DS_Store"
          rm -rf build/tailsignal

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: tailsignal
          path: build/tailsignal.zip
          retention-days: 5
